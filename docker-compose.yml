version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: novavest-db
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-novavest_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novavest-network

  redis:
    image: redis:7-alpine
    container_name: novavest-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novavest-network

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: novavest-server
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@db:5432/${DATABASE_NAME:-novavest_db}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_IDS: ${ADMIN_IDS}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app/server
      - /app/server/node_modules
    networks:
      - novavest-network
    restart: unless-stopped

  client:
    build:
      context: ./client
    container_name: novavest-client
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://server:3000
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - novavest-network
    restart: unless-stopped
    depends_on:
      - server

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  novavest-network:
    driver: bridge
