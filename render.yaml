services:
  - type: web
    name: novavest-server
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: novavest-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_IDS
        sync: false

  - type: web
    name: novavest-client
    buildCommand: cd client && npm install && npm run build
    startCommand: npm run preview
    envVars:
      - key: VITE_API_URL
        value: https://novavest-server.onrender.com

databases:
  - name: novavest-db
    engine: postgres
    version: "15"
    databaseName: novavest_db
    user: postgres
